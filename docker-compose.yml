services:
  db:
    image: postgres:16-alpine
    container_name: lovspeil-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: lovspeil
      POSTGRES_PASSWORD: lovspeil
      POSTGRES_DB: lovspeil
    volumes:
      - lovspeil_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lovspeil -d lovspeil"]
      interval: 2s
      timeout: 5s
      retries: 10

volumes:
  lovspeil_pgdata:
